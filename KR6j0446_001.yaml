body:
  text: 一行撰譯夫真言教源自護摩法無上也此之中祕密教愛法也為求末世衆生敬愛說一印真言能利衆生故先說像其身六面六臂六足乘水牛所謂六面頂上三面中面菩薩形柔軟也其面頂有阿彌陀佛又六臂所謂左一鉾二輪索三弓右一劍二寶杖三箭以彼弓鑄勢也又六足左三足立輪右三足上彼輪下有木牛牛四足立花座復像背有火焰如虹又如吠琉璃其火中當像右足下有寅神次第十二神但未申對面復次壇水圓壇其壇中置輪可修行增益敬愛息災調伏皆可置其所口傳又當身口傳復次說一印口傳呪曰唵瑟底哩迦羅嚕婆吽缺娑呵以是印呪向佛成普禮及次第觀念復說曼陀羅法內院明王明王背有法形文殊外院東方召請童子其形如童子髻上生登以弓矢東南方計設尼童子如上形左拳右把三角鉾左拳置腰南方救護慧童子如上形左投輪右施無畏右足上西南方烏波計設尼童子如上形二手花鉢西方光綱童子左拳置腰右捧孔雀尾西北方地慧童子右手把三股如金剛藏王北方無垢光童子如上形左拳置腰右索上東北方不思議童子左拳置腰右劍地上物打勢也一一身五色立輪輪下一一有師子如是說法成就說法高山頂造淨室四十九日無言斷火如法百萬遍滿足然後法成就獲得復次法成就說符加法口傳地符天符如是說已末世衆生信受奉行保元二年七月二十三日於勸修寺西明院住房一校了僧智海
